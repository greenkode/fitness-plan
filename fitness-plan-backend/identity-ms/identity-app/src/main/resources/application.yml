spring:
  config:
    import: "optional:configtree:/run/secrets/"
  application:
    name: identity-ms
  jackson:
    property-naming-strategy: SNAKE_CASE
    deserialization:
      fail-on-unknown-properties: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    main:
      url: "jdbc:postgresql://${DB_HOST:localhost}:${DATABASE_PORT:5432}/${DATABASE_NAME:krachtix}?ApplicationName=${spring.application.name}&reWriteBatchedInserts=true&prepareThreshold=1&preferQueryMode=extended"
      username: ${db_user:krachtix}
      password: ${db_password:RespectTheHangover}
      driver-class-name: org.postgresql.Driver
      hikari:
        data-source-properties:
          cachePrepStmts: true
          prepStmtCacheSize: 1000
          prepStmtCacheSqlLimit: 4096
          useServerPrepStmts: true
          useLocalSessionState: true
          rewriteBatchedStatements: true
          cacheResultSetMetadata: true
          cacheServerConfiguration: true
          elideSetAutoCommits: true
          maintainTimeStats: false
          application: ${spring.application.name}
          tcpKeepAlive: true
          socketTimeout: 30
          prepareThreshold: 1
          preferQueryMode: extended
        maximum-pool-size: 5
        minimum-idle: 2
        schema: identity
        register-mbeans: false
        pool-name: "identity"
        connectionTimeout: 30000
        idleTimeout: 300000
        maxLifetime: 1800000
        leakDetectionThreshold: 60000
        validationTimeout: 5000
        connectionTestQuery: "SELECT 1"
        initializationFailTimeout: 30000
    read-replica:
      url: "jdbc:postgresql://${READ_REPLICA_DB_HOST:${DB_HOST:localhost}}:${READ_REPLICA_DATABASE_PORT:${DATABASE_PORT:5432}}/${READ_REPLICA_DATABASE_NAME:${DATABASE_NAME:krachtix}}?ApplicationName=${spring.application.name}&reWriteBatchedInserts=true"
      username: ${db_user:krachtix}
      password: ${db_password:RespectTheHangover}
      driver-class-name: org.postgresql.Driver
      hikari:
        data-source-properties:
          cachePrepStmts: true
          prepStmtCacheSize: 500
          prepStmtCacheSqlLimit: 2048
          useServerPrepStmts: true
          useLocalSessionState: true
          rewriteBatchedStatements: true
          cacheResultSetMetadata: true
          cacheServerConfiguration: true
          elideSetAutoCommits: true
          maintainTimeStats: false
          application: ${spring.application.name}
          tcpKeepAlive: true
          socketTimeout: 30
        maximum-pool-size: 3
        minimum-idle: 1
        schema: identity
        register-mbeans: false
        pool-name: "identity-replica"
        connectionTimeout: 30000
        idleTimeout: 300000
        maxLifetime: 1800000
        leakDetectionThreshold: 60000
        validationTimeout: 5000
        connectionTestQuery: "SELECT 1"
        initializationFailTimeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: identity
        show_sql: false
        format_sql: true
    open-in-view: false
  flyway:
    enabled: false
    locations: classpath:db/migration
    schemas: [identity]
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${IDENTITY_BASEURL:http://localhost:9202}
      client:
        registration:
          identity-ms-client:
            client-id: ${identity_client_id:identity-ms-client}
            client-secret: ${identity_client_secret:RespectTheHangover}
            authorization-grant-type: client_credentials
            scope: service:audit,service:notification,service:core,internal:read
          microsoft:
            client-id: ${MICROSOFT_CLIENT_ID:disabled}
            client-secret: ${MICROSOFT_CLIENT_SECRET:disabled}
            scope: openid,email,profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
        provider:
          identity-ms-client:
            token-uri: ${identity-ms.base-url}/oauth2/token
          microsoft:
            authorization-uri: https://login.microsoftonline.com/${MICROSOFT_TENANT_ID:common}/oauth2/v2.0/authorize
            token-uri: https://login.microsoftonline.com/${MICROSOFT_TENANT_ID:common}/oauth2/v2.0/token
            jwk-set-uri: https://login.microsoftonline.com/${MICROSOFT_TENANT_ID:common}/discovery/v2.0/keys
            user-info-uri: https://graph.microsoft.com/oidc/userinfo
            user-name-attribute: sub
  cache:
    type: hazelcast

hazelcast:
  cluster:
    name: ${HAZELCAST_CLUSTER_NAME:dev}
  members: ${HAZELCAST_MEMBERS:127.0.0.1:5701}
server:
  forward-headers-strategy: native
  port: ${SERVER_PORT:9202}
  tomcat:
    remoteip:
      remote-ip-header: x-forwarded-for
      protocol-header: x-forwarded-proto
      protocol-header-https-value: https

jwt:
  private-key-path: "${jwt_private_key:-----BEGIN PRIVATE KEY----------END PRIVATE KEY-----}"
  public-key-path: "${jwt_public_key:-----BEGIN PUBLIC KEY----------END PUBLIC KEY-----}"
  issuer: ${IDENTITY_BASEURL:http://localhost:9202}
  expiration: 3600
  audience: "core-ms-client"

identity:
  totp:
    issuer: Krachtix
    time-period: 30
    allowed-discrepancy: 1
    encryption-key: ${TOTP_ENCRYPTION_KEY:change-me-in-production-32chars!}
  2fa:
    token-length: 6
    skip-for-trusted-devices: ${SKIP_2FA_TRUSTED_DEVICES:true}
    reverification-interval-hours: ${TWO_FACTOR_REVERIFICATION_HOURS:24}
  trusted-device:
    enabled: ${TRUSTED_DEVICE_ENABLED:true}
    max-devices-per-user: ${MAX_TRUSTED_DEVICES:5}
    default-duration-days: ${TRUSTED_DEVICE_DURATION:1}
    cleanup-expired-cron: "0 0 2 * * *"

logging:
  level:
    root: INFO

bucket4j:
  enabled: true
  cache-to-use: hazelcast
  methods:
    - name: "2fa-resend"
      cache-name: "ae-rate-limit-buckets"
      rate-limit:
        bandwidths:
          - capacity: 1
            time: 1
            unit: minutes
    - name: "login-attempts"
      cache-name: "ae-rate-limit-buckets"
      rate-limit:
        bandwidths:
          - capacity: 5
            time: 1
            unit: minutes
    - name: "2fa-verify"
      cache-name: "ae-rate-limit-buckets"
      rate-limit:
        bandwidths:
          - capacity: 10
            time: 1
            unit: minutes
    - name: "user-invitation"
      cache-name: "ae-rate-limit-buckets"
      rate-limit:
        bandwidths:
          - capacity: 3
            time: 1
            unit: minutes
    - name: "invitation-validate"
      cache-name: "ae-rate-limit-buckets"
      rate-limit:
        bandwidths:
          - capacity: 10
            time: 1
            unit: minutes
    - name: "invitation-complete"
      cache-name: "ae-rate-limit-buckets"
      rate-limit:
        bandwidths:
          - capacity: 5
            time: 1
            unit: minutes
    - name: "resend-invitation"
      cache-name: "ae-rate-limit-buckets"
      rate-limit:
        bandwidths:
          - capacity: 2
            time: 1
            unit: minutes
    - name: "password-reset"
      cache-name: "ae-rate-limit-buckets"
      rate-limit:
        bandwidths:
          - capacity: 3
            time: 1
            unit: minutes
    - name: "totp-setup"
      cache-name: "ae-rate-limit-buckets"
      rate-limit:
        bandwidths:
          - capacity: 3
            time: 1
            unit: minutes
    - name: "totp-verify"
      cache-name: "ae-rate-limit-buckets"
      rate-limit:
        bandwidths:
          - capacity: 5
            time: 1
            unit: minutes
    - name: "password-change"
      cache-name: "ae-rate-limit-buckets"
      rate-limit:
        bandwidths:
          - capacity: 3
            time: 1
            unit: minutes

app:
  cors:
    allowed-origins: ${ALLOWED_CORS_ORIGINS:*}
  oauth:
    frontend-callback-url: ${FRONTEND_URL:http://localhost:3000}/auth/oauth-callback
  merchant:
    invitation:
      base-url: ${MERCHANT_INVITATION_BASE_URL:http://localhost:3000/invite}
  password-reset:
    base-url: ${PASSWORD_RESET_BASE_URL:http://localhost:3000/reset-password}
  registration:
    verification-base-url: ${REGISTRATION_VERIFICATION_BASE_URL:http://localhost:3000/auth/verify-email}

identity-ms:
  base-url: ${IDENTITY_BASEURL:http://localhost:9202}
  token:
    expiry: 600
  refresh-token:
    expiry: 86400
  client:
    id: identity-ms-client
    secret: ${identity_client_secret:RespectTheHangover}

notification-ms:
  base-url: ${NOTIFICATION_MS_BASE_URL:http://localhost:9204}

audit-ms:
  base-url: ${AUDIT_MS_BASE_URL:http://localhost:9200}

core-ms:
  base-url: ${CORE_MS_BASE_URL:http://localhost:9201}

stripe:
  api-key: ${STRIPE_API_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  enabled: ${STRIPE_ENABLED:false}

storage:
  s3:
    endpoint: ${S3_ENDPOINT:http://localhost:9000}
    region: ${S3_REGION:us-east-1}
    access-key: ${S3_ACCESS_KEY:minioadmin}
    secret-key: ${S3_SECRET_KEY:minioadmin}
    bucket: ${S3_BUCKET:krachtix}
    public-url: ${S3_PUBLIC_URL:}

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_ENABLED:true}
    path: /v3/api-docs
  swagger-ui:
    enabled: ${SPRINGDOC_ENABLED:true}
    path: /swagger-ui.html
    oauth:
      client-id: ${identity_client_id:identity-ms-client}

