spring:
  application:
    name: identity-ms-test
  jpa:
    hibernate:
      ddl-auto: none
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        show_sql: false
        format_sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: [identity]
    clean-disabled: false
  cache:
    type: simple
    cache-names:
      - rate-limit-config
      - rate-limit-bucket
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9202
      client:
        registration:
          identity-ms-client:
            client-id: test-client
            client-secret: test-secret
            authorization-grant-type: client_credentials
            scope: service:audit,service:notification,service:core
        provider:
          identity-ms-client:
            token-uri: http://localhost:9202/oauth2/token

server:
  port: 0

jwt:
  private-key-path: "-----BEGIN PRIVATE KEY----------END PRIVATE KEY-----"
  public-key-path: "-----BEGIN PUBLIC KEY----------END PUBLIC KEY-----"
  issuer: http://localhost:9202
  expiration: 3600
  audience: "core-ms-client"

identity:
  2fa:
    token-length: 6
    skip-for-trusted-devices: true
  trusted-device:
    enabled: true
    max-devices-per-user: 5
    default-duration-days: 30
    cleanup-expired-cron: "0 0 2 * * *"

logging:
  level:
    root: WARN
    com.krachtix: INFO

bucket4j:
  enabled: false

app:
  cors:
    allowed-origins: http://localhost:3000
  oauth:
    frontend-callback-url: http://localhost:3000/auth/oauth-callback
  merchant:
    invitation:
      base-url: http://localhost:3000/invite
  password-reset:
    base-url: http://localhost:3000/reset-password
  registration:
    verification-base-url: http://localhost:3000/verify-email

identity-ms:
  base-url: http://localhost:9202
  token:
    expiry: 600
  refresh-token:
    expiry: 86400
  client:
    id: test-client
    secret: test-secret

notification-ms:
  base-url: http://localhost:9204

audit-ms:
  base-url: http://localhost:9200

core-ms:
  base-url: http://localhost:9201

storage:
  s3:
    endpoint: http://localhost:9000
    region: us-east-1
    access-key: testkey
    secret-key: testsecret
    bucket: test-bucket
    public-url: http://localhost:9000

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
