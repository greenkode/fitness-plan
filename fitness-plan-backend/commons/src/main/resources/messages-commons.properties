# Commons error messages
commons.error.internal=An internal error occurred. Please try again later.
commons.error.authentication_failed=Authentication failed. Please check your credentials.
commons.error.access_denied=Access denied. You do not have permission to perform this action.
commons.error.invalid_request=Invalid request. Please check your input and try again.
commons.error.not_found=The requested resource was not found.
commons.error.duplicate_record=A record with this identifier already exists.
commons.error.record_not_found=The requested {0} was not found.
commons.error.unauthorized=You are not authorized to access this resource.
commons.error.forbidden=You do not have permission to perform this action.
commons.error.validation_failed=Validation failed. Please check your input.
commons.error.field_required=The field ''{0}'' is required.
commons.error.invalid_request_body=Invalid request body. Please check your input.
commons.error.external_service=External service is temporarily unavailable. Please try again later.
commons.error.external_service_error=External service returned an error.
commons.error.concurrent_modification=The request could not be completed due to a concurrent update. Please try again.
