spring:
  config:
    import: "optional:configtree:/run/secrets/"
  application:
    name: rag-ms
  jackson:
    property-naming-strategy: SNAKE_CASE

  datasource:
    url: "jdbc:postgresql://${DB_HOST:localhost}:${DATABASE_PORT:5432}/${DATABASE_NAME:krachtix}?ApplicationName=${spring.application.name}&reWriteBatchedInserts=true&prepareThreshold=1&preferQueryMode=extended"
    username: ${db_user:krachtix}
    password: ${db_password:RespectTheHangover}
    driver-class-name: org.postgresql.Driver
    hikari:
      data-source-properties:
        cachePrepStmts: true
        prepStmtCacheSize: 250
        prepStmtCacheSqlLimit: 2048
        useServerPrepStmts: true
        useLocalSessionState: true
        rewriteBatchedStatements: true
        cacheResultSetMetadata: true
        cacheServerConfiguration: true
        elideSetAutoCommits: true
        maintainTimeStats: false
        application: ${spring.application.name}
        tcpKeepAlive: true
        socketTimeout: 30
        prepareThreshold: 1
        preferQueryMode: extended
      maximum-pool-size: 5
      minimum-idle: 2
      schema: rag
      register-mbeans: false
      pool-name: "rag"
      connectionTimeout: 30000
      idleTimeout: 300000
      maxLifetime: 1800000
      leakDetectionThreshold: 60000
      validationTimeout: 5000
      connectionTestQuery: "SELECT 1"
      initializationFailTimeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: rag
        show_sql: false
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    default-schema: rag
    schemas: rag
    create-schemas: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${IDENTITY_BASEURL:http://localhost:9202}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
    metrics:
      enabled: true
  health:
    readinessState:
      enabled: true
    livenessState:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

server:
  port: ${SERVER_PORT:9203}
  shutdown: graceful
  forward-headers-strategy: native

langchain4j:
  ollama:
    embedding:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      model-name: ${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}

rag:
  pgvector:
    table-name: ${RAG_TABLE_NAME:rag_embedding}
  splitter:
    max-segment-size: ${RAG_SPLITTER_MAX_SEGMENT_SIZE:1000}
    max-overlap-size: ${RAG_SPLITTER_MAX_OVERLAP_SIZE:200}

identity-ms:
  base-url: ${IDENTITY_BASEURL:http://localhost:9202}

logging:
  level:
    root: INFO
